services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      # Pra seus scripts enxergarem credenciais AWS:
      AWS_PROFILE: default
      AWS_DEFAULT_REGION: us-east-1

      # Ajuste se seu app.yaml usa timezone etc
      TZ: America/Sao_Paulo

    volumes:
      # DAGs
      - ./airflow/dags:/opt/airflow/dags
      # Seu projeto (pra rodar python -m src.cli)
      - ./:/opt/airflow/pipeline
      # Credenciais AWS do WSL (lidas pelo boto3)
      - ~/.aws:/home/airflow/.aws:ro

    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create
        --username admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
        --password admin || true &&
      airflow webserver
      "

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AWS_PROFILE: default
      AWS_DEFAULT_REGION: us-east-1
      TZ: America/Sao_Paulo

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/pipeline
      - ~/.aws:/home/airflow/.aws:ro

    command: >
      bash -c "
      airflow scheduler
      "

volumes:
  airflow_pg_data: